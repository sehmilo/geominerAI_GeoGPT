version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/geominerai"
      DATABASE_URL_SYNC: "postgresql://postgres:postgres@postgres:5432/geominerai"
      REDIS_URL: "redis://redis:6379/0"
      HF_TOKEN: "${HF_TOKEN:-}"
      PYTHONPATH: /app
    volumes:
      - ./core:/app/core
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@postgres:5432/geominerai"
      DATABASE_URL_SYNC: "postgresql://postgres:postgres@postgres:5432/geominerai"
      REDIS_URL: "redis://redis:6379/0"
      HF_TOKEN: "${HF_TOKEN:-}"
      PYTHONPATH: /app
    volumes:
      - ./core:/app/core
      - ./backend:/app/backend
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      celery -A backend.tasks.celery_app:celery_app worker
      --loglevel=info --concurrency=2

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: geominerai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
